<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate of Reviewing – JICS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Great+Vibes&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            font-family: serif;
        }

        .cert-wrapper {
            width: 900px;
            max-width: 100%;
            /* outer gold border */
            border: 6px solid #b8972a;
            outline: 2px solid #b8972a;
            outline-offset: -12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            background: #fff;
        }

        .cert-body {
            background: #ffffff;
            padding: 36px 48px 40px;
            position: relative;
        }

        /* Inner thin border */
        .cert-body::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1.5px solid #c9a840;
            pointer-events: none;
            z-index: 0;
        }

        /* ---- HEADER ROW ---- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .logo-img {
            height: 62px;
            width: auto;
        }

        .date-text {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            color: #555;
            text-align: center;
        }

        .jics-logo {
            height: 62px;
            width: auto;
        }

        /* ---- SEPARATOR LINE ---- */
        .sep {
            border: none;
            border-top: 1.5px solid #1a3a6e;
            margin: 0 0 20px;
            position: relative;
            z-index: 1;
        }

        /* ---- MAIN TITLE ---- */
        .main-title-block {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 4px;
        }

        .journal-title {
            font-family: 'Cinzel', serif;
            font-size: 44px;
            font-weight: 700;
            color: #1a3a6e;
            line-height: 1.1;
            letter-spacing: 0.01em;
        }

        .cert-of-reviewing {
            font-family: 'Cinzel', serif;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.4em;
            color: #555;
            margin-top: 12px;
            text-transform: uppercase;
        }

        .awarded-to {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.35em;
            color: #888;
            margin-top: 6px;
            text-transform: uppercase;
        }

        /* ---- RECIPIENT NAME ---- */
        .name-block {
            text-align: center;
            margin: 10px 0 6px;
            position: relative;
            z-index: 1;
        }

        .recipient-name {
            font-family: 'Great Vibes', cursive;
            font-size: 66px;
            color: #1a3a6e;
            line-height: 1.1;
        }

        .name-underline {
            width: 55%;
            margin: 4px auto 0;
            border-top: 1px solid #888;
        }

        /* ---- BODY TEXT ---- */
        .body-para {
            text-align: center;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            color: #222;
            line-height: 1.7;
            max-width: 620px;
            margin: 18px auto 24px;
            position: relative;
            z-index: 1;
        }

        /* ---- SIGNATURE ---- */
        .signature-row {
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .sig-col {
            text-align: center;
            width: 240px;
        }

        .sig-img {
            height: 80px;
            width: auto;
            margin-bottom: 2px;
        }

        .sig-line {
            border-top: 1px solid #555;
            margin: 0 20px 6px;
        }

        .sig-name {
            font-family: 'Cinzel', serif;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #222;
        }

        .sig-role {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #555;
            margin-top: 2px;
        }
    </style>
</head>
